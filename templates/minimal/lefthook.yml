pre-commit:
  parallel: true
  commands:
    lint:
      run: pnpm lint --if-present
    format-check:
      run: pnpm format:check --if-present

pre-push:
  commands:
    tests:
      run: pnpm test --if-present
    review:
      run: ./.scripts/review.sh || true # non-blocking locally; remove `|| true` to hard-block
